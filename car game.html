<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Simple Car Game</title>
  <style>
    body { margin: 0; overflow: hidden; background: #333; }
    canvas { display: block; margin: auto; background: #555; }
  </style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = 400;
canvas.height = 600;

let car = { x: 180, y: 500, width: 40, height: 60 };
let obstacles = [];
let score = 0;

let keys = {};
document.addEventListener('keydown', e => keys[e.key] = true);
document.addEventListener('keyup', e => keys[e.key] = false);

function spawnObstacle() {
  let x = Math.random() * (canvas.width - 40);
  obstacles.push({ x: x, y: -60, width: 40, height: 60, speed: 3 });
}

setInterval(spawnObstacle, 1200);

function update() {
  // Move car
  if (keys['ArrowLeft'] && car.x > 0) car.x -= 5;
  if (keys['ArrowRight'] && car.x < canvas.width - car.width) car.x += 5;

  // Move obstacles
  obstacles.forEach((obs, i) => {
    obs.y += obs.speed;

    // Collision detection
    if (
      car.x < obs.x + obs.width &&
      car.x + car.width > obs.x &&
      car.y < obs.y + obs.height &&
      car.y + car.height > obs.y
    ) {
      alert('Game Over! Score: ' + score);
      document.location.reload();
    }

    if (obs.y > canvas.height) {
      obstacles.splice(i, 1);
      score++;
    }
  });
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Road lines
  ctx.fillStyle = 'white';
  for (let i = 0; i < canvas.height; i += 40) {
    ctx.fillRect(195, i, 10, 20);
  }

  // Car
  ctx.fillStyle = 'blue';
  ctx.fillRect(car.x, car.y, car.width, car.height);

  // Obstacles
  ctx.fillStyle = 'red';
  obstacles.forEach(obs => {
    ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
  });

  // Score
  ctx.fillStyle = 'white';
  ctx.font = '20px Arial';
  ctx.fillText('Score: ' + score, 10, 30);
}

function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
</body>
</html>
