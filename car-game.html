<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Car Game</title>
<style>
body{margin:0;background:#111;}
canvas{display:block;margin:auto;background:#222;}
</style>
</head>
<body>

<canvas id="c"></canvas>

<script>
const c=document.getElementById("c");
const ctx=c.getContext("2d");
c.width=400;c.height=600;

let car={x:180,y:500};
let obs=[],score=0,speed=3;
let left=false,right=false;

document.addEventListener("keydown",e=>{
 if(e.key==="ArrowLeft") left=true;
 if(e.key==="ArrowRight") right=true;
});
document.addEventListener("keyup",e=>{
 if(e.key==="ArrowLeft") left=false;
 if(e.key==="ArrowRight") right=false;
});

setInterval(()=>obs.push({x:Math.random()*360,y:-60}),1000);

function update(){
 speed+=0.001;

 if(left) car.x-=6;
 if(right) car.x+=6;

 obs.forEach((o,i)=>{
  o.y+=speed;

  if(o.y>600){
   obs.splice(i,1);
   score++;
  }

  if(Math.abs(car.x-o.x)<40 && Math.abs(car.y-o.y)<40){
   localStorage.setItem("carHigh",Math.max(score,localStorage.getItem("carHigh")||0));
   alert("Game Over: "+score);
   location.reload();
  }
 });
}

function draw(){
 ctx.clearRect(0,0,400,600);

 ctx.fillStyle="white";
 for(let i=0;i<600;i+=40){
   ctx.fillRect(195,i,10,20);
 }

 ctx.fillStyle="blue";
 ctx.fillRect(car.x,car.y,40,60);

 ctx.fillStyle="red";
 obs.forEach(o=>ctx.fillRect(o.x,o.y,40,60));

 ctx.fillStyle="white";
 ctx.fillText("Score: "+score,10,20);
 ctx.fillText("High: "+(localStorage.getItem("carHigh")||0),10,40);
}

function loop(){update();draw();requestAnimationFrame(loop);}
loop();
</script>

</body>
</html>
