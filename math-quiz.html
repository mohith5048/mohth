<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math Quiz</title>
<style>
body {
 margin:0; font-family:Arial;
 background:#0f172a; color:white;
 display:flex; justify-content:center;
 align-items:center; height:100vh;
}
.box {
 background:#1e293b;
 padding:20px;
 border-radius:15px;
 text-align:center;
 width:90%; max-width:300px;
}
input,button {
 width:90%; padding:10px;
 margin-top:10px;
 border-radius:10px;
 border:none;
}
button { background:#38bdf8; }
</style>
</head>
<body>

<div class="box">
<h2>⚡ Math Quiz</h2>
<div id="q">0+0</div>
<input id="ans" type="number">
<button onclick="check()">Submit</button>
<div>Score: <span id="s">0</span></div>
<div>Time: <span id="t">30</span></div>
</div>

<script>
let score=0,time=30,ans;

function gen(){
 let a=Math.floor(Math.random()*10);
 let b=Math.floor(Math.random()*10);
 ans=a+b;
 document.getElementById("q").innerText=a+" + "+b;
}

function check(){
 let val=parseInt(ansInput.value);
 if(val===ans){ score++; time+=2; }
 s.innerText=score;
 ansInput.value="";
 gen();
}

const ansInput=document.getElementById("ans");
const s=document.getElementById("s");
const t=document.getElementById("t");

setInterval(()=>{
 time--;
 t.innerText=time;
 if(time<=0){
  alert("Score: "+score);
  location.reload();
 }
},1000);

gen();
</script>

</body>
</html>
