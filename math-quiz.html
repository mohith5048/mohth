<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fast Math Quiz</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .game {
    text-align: center;
    background: #1e293b;
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    width: 300px;
  }

  h1 { margin-bottom: 10px; }

  .question {
    font-size: 28px;
    margin: 20px 0;
  }

  input {
    padding: 10px;
    width: 80%;
    font-size: 18px;
    border-radius: 10px;
    border: none;
    outline: none;
    text-align: center;
  }

  .info {
    margin-top: 15px;
    font-size: 16px;
  }

  .timer {
    font-size: 20px;
    margin-top: 10px;
    color: #38bdf8;
  }
</style>
</head>
<body>
<div class="game">
  <h1>⚡ Math Rush</h1>
  <div class="timer">Time: <span id="time">30</span>s</div>
  <div class="question" id="question">0 + 0</div>
  <input type="number" id="answer" autofocus />
  <div class="info">Score: <span id="score">0</span></div>
</div>

<script>
let score = 0;
let time = 30;
let currentAnswer;

const questionEl = document.getElementById('question');
const answerEl = document.getElementById('answer');
const scoreEl = document.getElementById('score');
const timeEl = document.getElementById('time');

function generateQuestion() {
  let a = Math.floor(Math.random() * 10);
  let b = Math.floor(Math.random() * 10);
  let ops = ['+', '-', '*'];
  let op = ops[Math.floor(Math.random() * ops.length)];

  switch(op) {
    case '+': currentAnswer = a + b; break;
    case '-': currentAnswer = a - b; break;
    case '*': currentAnswer = a * b; break;
  }

  questionEl.textContent = `${a} ${op} ${b}`;
}

answerEl.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    checkAnswer();
  }
});

function checkAnswer() {
  let userAnswer = parseInt(answerEl.value);
  if (userAnswer === currentAnswer) {
    score++;
    scoreEl.textContent = score;
    time += 2; // reward time
  }
  answerEl.value = '';
  generateQuestion();
}

function countdown() {
  time--;
  timeEl.textContent = time;

  if (time <= 0) {
    clearInterval(timer);
    alert('Time up! Final Score: ' + score);
    location.reload();
  }
}

const timer = setInterval(countdown, 1000);

generateQuestion();
</script>
</body>
</html>
