<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shooting Game</title>
<style>
body{margin:0;overflow:hidden;background:black;}
canvas{display:block;}
</style>
</head>
<body>

<canvas id="c"></canvas>

<script>
const c=document.getElementById("c");
const ctx=c.getContext("2d");
c.width=innerWidth;
c.height=innerHeight;

let player={x:c.width/2,y:c.height-60};
let bullets=[],enemies=[],score=0;
let left=false,right=false;

// Sound
let shootSound=new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");

document.addEventListener("keydown",e=>{
 if(e.key==="ArrowLeft") left=true;
 if(e.key==="ArrowRight") right=true;
 if(e.key===" ") shoot();
});
document.addEventListener("keyup",e=>{
 if(e.key==="ArrowLeft") left=false;
 if(e.key==="ArrowRight") right=false;
});

function shoot(){
 bullets.push({x:player.x,y:player.y});
 shootSound.currentTime=0;
 shootSound.play();
}

setInterval(()=>enemies.push({x:Math.random()*c.width,y:-20}),800);

function update(){
 if(left) player.x-=6;
 if(right) player.x+=6;

 bullets.forEach((b,i)=>{ b.y-=10; if(b.y<0) bullets.splice(i,1); });

 enemies.forEach((e,i)=>{
  e.y+=4;
  if(e.y>c.height) enemies.splice(i,1);
 });

 bullets.forEach((b,bi)=>{
  enemies.forEach((e,ei)=>{
   if(Math.abs(b.x-e.x)<20 && Math.abs(b.y-e.y)<20){
    bullets.splice(bi,1);
    enemies.splice(ei,1);
    score++;
    localStorage.setItem("shootHigh",Math.max(score,localStorage.getItem("shootHigh")||0));
   }
  });
 });
}

function draw(){
 ctx.fillStyle="black";
 ctx.fillRect(0,0,c.width,c.height);

 ctx.fillStyle="cyan";
 ctx.fillRect(player.x-10,player.y-10,20,20);

 ctx.fillStyle="yellow";
 bullets.forEach(b=>ctx.fillRect(b.x,b.y,4,12));

 ctx.fillStyle="red";
 enemies.forEach(e=>ctx.fillRect(e.x,e.y,20,20));

 ctx.fillStyle="white";
 ctx.fillText("Score: "+score,20,30);
 ctx.fillText("High: "+(localStorage.getItem("shootHigh")||0),20,60);
}

function loop(){update();draw();requestAnimationFrame(loop);}
loop();
</script>

</body>
</html>
