<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shooting Game</title>
<style>
body { margin:0; overflow:hidden; background:#111; }
canvas { display:block; }
.controls {
  position:fixed; bottom:20px; width:100%;
  display:flex; justify-content:space-between;
}
button {
  width:80px; height:80px; font-size:20px;
  border-radius:50%; border:none; background:#38bdf8;
}
</style>
</head>
<body>

<canvas id="game"></canvas>

<div class="controls">
<button ontouchstart="left=true" ontouchend="left=false">⬅️</button>
<button ontouchstart="shoot()">🔥</button>
<button ontouchstart="right=true" ontouchend="right=false">➡️</button>
</div>

<script>
const c = document.getElementById("game");
const ctx = c.getContext("2d");
c.width = innerWidth;
c.height = innerHeight;

let player = {x:c.width/2,y:c.height-60};
let bullets=[], enemies=[], score=0;
let left=false,right=false;

function shoot(){ bullets.push({x:player.x,y:player.y}); }

document.addEventListener("keydown",e=>{
 if(e.key==="ArrowLeft") left=true;
 if(e.key==="ArrowRight") right=true;
 if(e.key===" ") shoot();
});
document.addEventListener("keyup",e=>{
 if(e.key==="ArrowLeft") left=false;
 if(e.key==="ArrowRight") right=false;
});

setInterval(()=> enemies.push({x:Math.random()*c.width,y:-20}),1000);

function update(){
 if(left) player.x-=6;
 if(right) player.x+=6;

 bullets.forEach((b,i)=>{ b.y-=8; if(b.y<0) bullets.splice(i,1); });

 enemies.forEach((e,i)=>{
  e.y+=3;
  if(e.y>c.height) enemies.splice(i,1);
 });

 bullets.forEach((b,bi)=>{
  enemies.forEach((e,ei)=>{
   if(Math.abs(b.x-e.x)<20 && Math.abs(b.y-e.y)<20){
    bullets.splice(bi,1);
    enemies.splice(ei,1);
    score++;
   }
  });
 });
}

function draw(){
 ctx.fillStyle="#111"; ctx.fillRect(0,0,c.width,c.height);
 ctx.fillStyle="white"; ctx.fillRect(player.x-10,player.y-10,20,20);
 ctx.fillStyle="yellow"; bullets.forEach(b=>ctx.fillRect(b.x,b.y,5,10));
 ctx.fillStyle="red"; enemies.forEach(e=>ctx.fillRect(e.x,e.y,20,20));
 ctx.fillText("Score:"+score,20,30);
}

function loop(){ update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
</body>
</html>
